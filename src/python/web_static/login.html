<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeOS · Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    /* Map missing vars to existing dashboard tokens */
    :root {
      --text-dim: var(--muted);
      --surface-raised: var(--card);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--text);
    }
    .login-logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
    }
    .login-card h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
      color: var(--text);
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .login-field label {
      font-size: .8rem;
      font-weight: 500;
      color: var(--text-dim);
    }
    .login-field input {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .6rem .75rem;
      font-family: inherit;
      font-size: .95rem;
      color: var(--text);
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }
    .login-field input:focus {
      border-color: var(--accent);
    }
    .login-submit {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .7rem;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .25rem;
      width: 100%;
    }
    .login-submit:hover { opacity: .88; }
    .login-error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: .6rem .75rem;
      font-size: .85rem;
      color: #f87171;
      display: none;
    }
    .login-error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-home-2"></i></div>
      HomeOS
    </div>
    <h1>Sign in</h1>
    <div class="login-error" id="loginError">Invalid username or password.</div>
    <form class="login-form" method="post" action="/login">
      <div class="login-field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus required>
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-submit">Sign in</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('loginError').classList.add('show');
    }
  </script>
</body>
</html>
