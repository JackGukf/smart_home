services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.pi
    image: smart-home-dashboard:latest
    container_name: smart-home-dashboard
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./configs:/app/configs:ro
    env_file: .env

  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    network_mode: host
    restart: unless-stopped
    volumes:
      - matter-data:/data

  go2rtc:
    image: ghcr.io/alexxit/go2rtc:latest
    container_name: go2rtc
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml:ro

  matter-bridge:
    build:
      context: .
      dockerfile: Dockerfile.matter-bridge
    image: smart-home-matter-bridge:latest
    container_name: matter-bridge
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - matter-data:/data
      - ./build/matter-bridge/chip-bridge-app:/usr/local/bin/chip-bridge:ro
    environment:
      - BRIDGE_SYNC_URL=http://localhost:8000
      - MATTER_IFACE=wlan0
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "ip link set docker0 down 2>/dev/null || true; exec /usr/local/bin/entrypoint.sh \"$@\""
      - "--"
    command:
      - "--KVS"
      - "/data/bridge/kvs"
      - "--interface"
      - "wlan0"

volumes:
  matter-data:
